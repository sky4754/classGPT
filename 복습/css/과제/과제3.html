<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: navy;
        }
        .important{
            border: 2px solid red;
            padding: 20px;
            margin-bottom: 20px;
        }
        .normal{
            border: 2px solid gray;
            padding: 20px;
            margin-bottom: 20px;
        }
        .thanks{
            color: green;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>
        공지사항
    </h1>

    <p class="important">
        📢 중요 공지입니다.
    </p>

    <p class="normal">
        일반 공지입니다.
    </p>

    <p class="thanks">
        감사합니다.
    </p>
</body>
</html>
