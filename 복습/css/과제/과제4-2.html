<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제4-2</title>
    <style>
        .card{
            border: 2px solid black;
            width: 200px;
            height: 180px;
            padding: 20px;
            display: inline-block;
            margin-right: 20px;
        }
        .minecraft{
            border-color: green;
        }

        .valorant{
            border-color: red;
        }

        .lostark{
            border-color: blue;
            
            margin-right: 0;
        }

        h1{
            color: navy;
        }

        .card h2{
            font-size: 22px;
        }

        .card p{
            color: gray;
        }

        .card a{
            color: purple;
        }
    </style>
</head>
<body>
    <h1>
        게임 센터
    </h1>

    <hr>

    <div class="card minecraft">
        <h2>
            마인크래프트
        </h2>
        <p>
            샌드박스 게임
        </p>
        <a href="#">
            바로가기
        </a>
    </div>

    <div class="card valorant">
        <h2>
            발로란트
        </h2>
        <p>
            FPS 게임
        </p>
        <a href="#">
            바로가기
        </a>
    </div>

    <div class="card lostark">
        <h2>
            로스트아크
        </h2>
        <p>
            RPG 게임
        </p>
        <a href="#">
            바로가기
        </a>
    </div>

</body>
</html>
