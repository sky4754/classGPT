<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #title{
            color: navy;
            font-size: 40px;
        }

        .important{
            color: red;
            font-weight: bold;
        }

        .normal{
            color: black;
        }

        .notice{
            color: orange;
            font-size: 20px;
        }

        .thanks{
            color: green;
        }
    </style>
</head>
<body>
    <h1 id="title">
        공지사항
    </h1>
    <hr>

    <p class="important">
        📢 중요 공지입니다.        
    </p>

    <p class="normal">
        일반 공지입니다.
    </p>

    <p class="notice">
        ※ 읽어주세요.
    </p>

    <p class="thanks">
        감사합니다.
    </p>
</body>
</html>
