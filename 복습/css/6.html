<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        body{
            margin: 0;
            min-height: 100vh;
            background-color: white;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box{
            width: 300px;
            border: 2px solid black;
            padding: 30px;
            margin-top: 50px;
        }

        .login-tltle{
            color: navy;
        }

        .input-box{
            width: 250px;
            height: 30px;
            margin-bottom: 15px;
        }
        
        .login-button{
            width: 260px;
            height: 40px;
            background-color: navy;
            color: white;
            border: 2px solid navy;
        } 

        .info-text{
            color: gray;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1 class="login-title">
            로그인
        </h1>

        <form action="http://127.0.0.1:5501/css/1.html"target="_blank">
            <p>
            아이디
        </p>
        <input class="input-box" type="text" placeholder="아이디를 입력해주세요."required>
        
        <p>
            비밀번호
        </p>
        <input class="input-box" type="password" placeholder="비밀번호를 입력해주세요."required>
        
        <button class="login-button" type="submit">
                로그인
        </button>

        <p class="info-text">
            회원가입
        </p>
        </form>

    </div>
</body>
</html>
